            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            transition: all var(--transition-fast);
            font-family: var(--font-body);
            font-weight: 600;
        }
        .filter-btn.active, .filter-btn:hover {
            background: var(--accent-color);
            color: #000;
